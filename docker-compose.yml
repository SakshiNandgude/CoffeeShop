version: '3'

services:

  frontend:
    build: .
    ports:
      - "8081:80" 
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    depends_on:
      - db

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coffee_db
    ports:
      - "3307:3306"